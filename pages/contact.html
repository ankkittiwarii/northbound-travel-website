<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | Northbound</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root {
--brand-navy: #1a242f;
--brand-accent: #ff4d00;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Inter',sans-serif;
background:#f0f2f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
display:flex;
width:100%;
max-width:1050px;
background:#fff;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
overflow:hidden;
}

.sidebar{
flex:1;
background:var(--brand-navy);
color:#fff;
padding:60px 45px;
}

.sidebar h1{
font-size:2.4rem;
margin-bottom:20px;
}

.sidebar p{
opacity:.8;
margin-bottom:40px;
}

.contact-item{
margin-bottom:25px;
}

.contact-item label{
color:var(--brand-accent);
font-size:.7rem;
font-weight:700;
letter-spacing:1.5px;
display:block;
margin-bottom:5px;
}

.form-area{
flex:1.4;
padding:60px;
}

.form-area h2{
margin-bottom:25px;
}

input, textarea{
width:100%;
padding:14px;
border:1px solid #eee;
border-radius:8px;
margin-bottom:20px;
font-family:inherit;
font-size:1rem;
background:#fafafa;
}

input:focus, textarea:focus{
outline:none;
border-color:var(--brand-accent);
background:#fff;
}

textarea{
height:150px;
resize:none;
}

.btn-submit{
background:var(--brand-navy);
color:#fff;
border:none;
padding:15px 30px;
border-radius:6px;
font-weight:600;
cursor:pointer;
}

.btn-submit:hover{
background:var(--brand-accent);
}

</style>
</head>

<script>

const urlParams = new URLSearchParams(window.location.search);

if(urlParams.get('success')){
alert("✅ Your message has been sent successfully!");
}

if(urlParams.get('error')){
alert("❌ Something went wrong. Please try again.");
}

</script>

<body>

<div class="container">

<div class="sidebar">
<h1>Northbound.</h1>

<p>The ultimate travel experience starts with a conversation. Let us curate your next adventure.</p>

<div class="contact-item">
<label>Email Us</label>
<span>karansharma@northbound-travel.com</span>
</div>

<div class="contact-item">
<label>Visit Office</label>
<span>Sec-17, Chandigarh, India</span>
</div>

<div class="contact-item">
<label>Call Support</label>
<span>+91 6280647885</span>
</div>

</div>


<div class="form-area">

<h2>Get in Touch</h2>

<form action="../backend/contact.php" method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" placeholder="Tell us about your dream destination or ask a question..." required></textarea>

<button type="submit" class="btn-submit">Send My Inquiry</button>

</form>

</div>

</div>

</body>
</html>
